name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check Python syntax
        run: python -m py_compile main.py detect.py camera.py notify.py homeassistant.py roboflow_upload.py utils.py
